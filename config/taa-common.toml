
["Tacz Attribute Add Configuration"]
	#最大伤害倍率限制
	#设置属性可以提供的最大伤害倍率上限，支持热重载
	#Range: 1.0 ~ 10000.0
	maxDamageMultiplier = 1024.0
	#启用特定枪械类型属性
	#如果启用，将为不同枪械类型（手枪、步枪等）创建独立的伤害属性
	enableSpecificGunTypes = false
	#调试模式
	#启用调试日志输出
	debugMode = false
	#伤害计算模式
	#选择属性值的计算方式：MAX（取最大值）、ADD（相加）、MULTIPLY（相乘）
	#Allowed Values: MAX, ADD, MULTIPLY
	damageCalculationMode = "MAX"

